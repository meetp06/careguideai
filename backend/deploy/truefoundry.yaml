# TrueFoundry Service Manifest
# Deploy: tfy deploy --file deploy/truefoundry.yaml
# Docs:   https://docs.truefoundry.com/docs/deploy-a-service

name: care-compass-api
type: service

image:
  type: build
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .

resources:
  cpu_request: "0.5"
  cpu_limit: "2"
  memory_request: "512Mi"
  memory_limit: "2Gi"
  replicas: 2

ports:
  - port: 8000
    protocol: HTTP
    expose: true
    path: /

health_checks:
  liveness:
    path: /health
    port: 8000
    initial_delay_seconds: 15
    period_seconds: 30
    failure_threshold: 3
  readiness:
    path: /health
    port: 8000
    initial_delay_seconds: 10
    period_seconds: 10

env:
  # ── Aerospike (use your cloud Aerospike endpoint) ─────────────────────────
  - name: AEROSPIKE_HOST
    value: "YOUR_AEROSPIKE_CLOUD_HOST"
  - name: AEROSPIKE_PORT
    value: "3000"
  - name: AEROSPIKE_NAMESPACE
    value: "care_compass"

  # ── AWS Bedrock ────────────────────────────────────────────────────────────
  - name: AWS_REGION
    value: "us-east-1"
  - name: BEDROCK_MODEL_ID
    value: "anthropic.claude-3-haiku-20240307-v1:0"

  # ── Secrets (set via TrueFoundry secrets UI, NOT in this file) ───────────
  # AWS_ACCESS_KEY_ID        → tfy secret
  # AWS_SECRET_ACCESS_KEY    → tfy secret
  # OVERMIND_API_KEY         → tfy secret
  # AIRBYTE_API_KEY          → tfy secret

  # ── App ────────────────────────────────────────────────────────────────────
  - name: APP_PORT
    value: "8000"
  - name: DEBUG
    value: "false"
  - name: CORS_ORIGINS
    value: "https://care-compass-ai.lovable.app,https://your-frontend-domain.com"

autoscaling:
  min_replicas: 1
  max_replicas: 5
  target_cpu_utilization: 70

labels:
  team: care-compass
  environment: production
  component: backend-api
